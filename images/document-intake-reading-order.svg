<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400" font-family="Helvetica, Arial, sans-serif">
  <rect width="920" height="400" fill="#ffffff"/>
  <text x="460" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Two-column PDFs: where extraction breaks and reconstruction does not</text>

  <!-- Left page: correct -->
  <text x="250" y="66" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#065f46">Reconstruction: reads column by column</text>
  <rect x="120" y="80" width="260" height="250" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <g fill="#cbd5e1">
    <rect x="140" y="104" width="100" height="9" rx="2"/><rect x="140" y="120" width="100" height="9" rx="2"/>
    <rect x="140" y="136" width="88" height="9" rx="2"/><rect x="140" y="168" width="100" height="9" rx="2"/>
    <rect x="140" y="184" width="94" height="9" rx="2"/><rect x="140" y="200" width="100" height="9" rx="2"/>
    <rect x="140" y="232" width="100" height="9" rx="2"/><rect x="140" y="248" width="80" height="9" rx="2"/>
    <rect x="260" y="104" width="100" height="9" rx="2"/><rect x="260" y="120" width="92" height="9" rx="2"/>
    <rect x="260" y="136" width="100" height="9" rx="2"/><rect x="260" y="168" width="100" height="9" rx="2"/>
    <rect x="260" y="184" width="86" height="9" rx="2"/><rect x="260" y="216" width="100" height="9" rx="2"/>
    <rect x="260" y="232" width="96" height="9" rx="2"/><rect x="260" y="248" width="100" height="9" rx="2"/>
  </g>
  <g font-size="13" font-weight="bold" fill="#059669">
    <circle cx="152" cy="292" r="12" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/><text x="152" y="296.5" text-anchor="middle">1</text>
    <circle cx="190" cy="292" r="12" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/><text x="190" y="296.5" text-anchor="middle">2</text>
    <circle cx="228" cy="292" r="12" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/><text x="228" y="296.5" text-anchor="middle">3</text>
    <circle cx="272" cy="292" r="12" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/><text x="272" y="296.5" text-anchor="middle">4</text>
    <circle cx="310" cy="292" r="12" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/><text x="310" y="296.5" text-anchor="middle">5</text>
    <circle cx="348" cy="292" r="12" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/><text x="348" y="296.5" text-anchor="middle">6</text>
  </g>
  <text x="250" y="352" text-anchor="middle" font-size="12" fill="#065f46">left column top to bottom, then right column:</text>
  <text x="250" y="369" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">1 2 3 then 4 5 6</text>

  <!-- Right page: broken -->
  <text x="670" y="66" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#991b1b">Glyph extraction: reads line by line across columns</text>
  <rect x="540" y="80" width="260" height="250" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <g fill="#cbd5e1">
    <rect x="560" y="104" width="100" height="9" rx="2"/><rect x="560" y="120" width="100" height="9" rx="2"/>
    <rect x="560" y="136" width="88" height="9" rx="2"/><rect x="560" y="168" width="100" height="9" rx="2"/>
    <rect x="560" y="184" width="94" height="9" rx="2"/><rect x="560" y="200" width="100" height="9" rx="2"/>
    <rect x="560" y="232" width="100" height="9" rx="2"/><rect x="560" y="248" width="80" height="9" rx="2"/>
    <rect x="680" y="104" width="100" height="9" rx="2"/><rect x="680" y="120" width="92" height="9" rx="2"/>
    <rect x="680" y="136" width="100" height="9" rx="2"/><rect x="680" y="168" width="100" height="9" rx="2"/>
    <rect x="680" y="184" width="86" height="9" rx="2"/><rect x="680" y="216" width="100" height="9" rx="2"/>
    <rect x="680" y="232" width="96" height="9" rx="2"/><rect x="680" y="248" width="100" height="9" rx="2"/>
  </g>
  <g font-size="13" font-weight="bold" fill="#dc2626">
    <circle cx="572" cy="292" r="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/><text x="572" y="296.5" text-anchor="middle">1</text>
    <circle cx="610" cy="292" r="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/><text x="610" y="296.5" text-anchor="middle">4</text>
    <circle cx="648" cy="292" r="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/><text x="648" y="296.5" text-anchor="middle">2</text>
    <circle cx="692" cy="292" r="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/><text x="692" y="296.5" text-anchor="middle">5</text>
    <circle cx="730" cy="292" r="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/><text x="730" y="296.5" text-anchor="middle">3</text>
    <circle cx="768" cy="292" r="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/><text x="768" y="296.5" text-anchor="middle">6</text>
  </g>
  <text x="670" y="352" text-anchor="middle" font-size="12" fill="#991b1b">sentences from both columns interleave:</text>
  <text x="670" y="369" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">1 4 2 5 3 6, and no error is raised</text>
</svg>
