<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="440" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Document Intake Agent</text>

  <!-- Incoming file -->
  <rect x="24" y="178" width="168" height="84" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="108" y="212" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Incoming file</text>
  <text x="108" y="231" text-anchor="middle" font-size="11.5" fill="#475569">docx, pptx, xlsx, pdf,</text>
  <text x="108" y="246" text-anchor="middle" font-size="11.5" fill="#475569">md, txt, ...</text>

  <!-- Inspect and route -->
  <rect x="244" y="178" width="156" height="84" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="322" y="212" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Inspect and route</text>
  <text x="322" y="231" text-anchor="middle" font-size="11.5" fill="#475569">extension vs the live</text>
  <text x="322" y="246" text-anchor="middle" font-size="11.5" fill="#475569">formats list</text>

  <!-- Read directly -->
  <rect x="452" y="44" width="200" height="64" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="552" y="71" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Read directly</text>
  <text x="552" y="90" text-anchor="middle" font-size="11.5" fill="#475569">already text (md, txt)</text>

  <!-- Conversion API -->
  <rect x="452" y="180" width="200" height="80" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="552" y="209" text-anchor="middle" font-size="14" font-weight="bold" fill="#0c4a6e">hushvert conversion API</text>
  <text x="552" y="228" text-anchor="middle" font-size="11.5" fill="#0369a1">submit, upload, poll,</text>
  <text x="552" y="243" text-anchor="middle" font-size="11.5" fill="#0369a1">download</text>

  <!-- Refusal -->
  <rect x="452" y="336" width="200" height="64" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="552" y="363" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Helpful refusal</text>
  <text x="552" y="382" text-anchor="middle" font-size="11.5" fill="#475569">unsupported format</text>

  <!-- Markdown -->
  <rect x="704" y="112" width="172" height="64" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="790" y="139" text-anchor="middle" font-size="14" font-weight="bold" fill="#064e3b">LLM-ready</text>
  <text x="790" y="157" text-anchor="middle" font-size="14" font-weight="bold" fill="#064e3b">markdown</text>

  <!-- Analyst -->
  <rect x="704" y="232" width="172" height="64" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="790" y="259" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Analyst LLM</text>
  <text x="790" y="278" text-anchor="middle" font-size="11.5" fill="#475569">gpt-4o-mini, grounded</text>

  <!-- Answer -->
  <rect x="704" y="352" width="172" height="56" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="790" y="385" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Grounded answer</text>

  <!-- Arrows -->
  <line x1="192" y1="220" x2="240" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="196" x2="448" y2="86" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="220" x2="448" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="244" x2="448" y2="358" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="652" y1="76" x2="700" y2="134" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="652" y1="220" x2="700" y2="156" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="790" y1="176" x2="790" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="790" y1="296" x2="790" y2="348" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="652" y1="368" x2="700" y2="378" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <!-- Edge labels -->
  <text x="424" y="140" text-anchor="middle" font-size="10.5" fill="#64748b">native</text>
  <text x="424" y="212" text-anchor="middle" font-size="10.5" fill="#64748b">convert</text>
  <text x="424" y="310" text-anchor="middle" font-size="10.5" fill="#64748b">unknown</text>
</svg>
