<svg xmlns="http://www.w3.org/2000/svg" width="920" height="380" viewBox="0 0 920 380" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="920" height="380" fill="#ffffff"/>
  <text x="460" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">What each path preserves</text>

  <!-- Source docx table -->
  <rect x="40" y="120" width="230" height="150" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="155" y="145" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#0f172a">q3_report.docx</text>
  <g font-size="11" fill="#334155">
    <line x1="60" y1="158" x2="250" y2="158" stroke="#94a3b8"/>
    <text x="70" y="175">Region</text><text x="140" y="175">Revenue</text><text x="205" y="175">Change</text>
    <line x1="60" y1="183" x2="250" y2="183" stroke="#cbd5e1"/>
    <text x="70" y="200">North</text><text x="140" y="200">128.4</text><text x="205" y="200">+6.1%</text>
    <line x1="60" y1="208" x2="250" y2="208" stroke="#cbd5e1"/>
    <text x="70" y="225">East</text><text x="140" y="225">143.9</text><text x="205" y="225">+11.4%</text>
    <line x1="60" y1="233" x2="250" y2="233" stroke="#cbd5e1"/>
    <text x="70" y="250">West</text><text x="140" y="250">61.7</text><text x="205" y="250">-4.3%</text>
    <line x1="130" y1="158" x2="130" y2="258" stroke="#cbd5e1"/>
    <line x1="195" y1="158" x2="195" y2="258" stroke="#cbd5e1"/>
  </g>

  <!-- Arrows -->
  <line x1="270" y1="160" x2="360" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="315" y="118" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#b91c1c">naive extraction</text>
  <line x1="270" y1="230" x2="360" y2="285" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="290" y="312" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#065f46">conversion to markdown</text>

  <!-- Naive output -->
  <rect x="370" y="52" width="510" height="110" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="390" y="78" font-size="13" font-weight="bold" fill="#991b1b">Flat text stream: structure gone</text>
  <text x="390" y="102" font-size="12" font-family="Menlo, monospace" fill="#7f1d1d">Region Revenue Change North 128.4 +6.1% South</text>
  <text x="390" y="120" font-size="12" font-family="Menlo, monospace" fill="#7f1d1d">95.2 +2.8% East 143.9 +11.4% West 61.7 -4.3% ...</text>
  <text x="390" y="146" font-size="11.5" fill="#991b1b">which value belongs to which region is now a token-counting exercise</text>

  <!-- Converted output -->
  <rect x="370" y="218" width="510" height="130" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="390" y="244" font-size="13" font-weight="bold" fill="#065f46">GFM pipe table: rows still mean something</text>
  <g font-size="12" font-family="Menlo, monospace" fill="#064e3b">
    <text x="390" y="268">| Region | Revenue ($M) | Change vs Q2 |</text>
    <text x="390" y="286">| ------ | ------------ | ------------ |</text>
    <text x="390" y="304">| North  | 128.4        | +6.1%        |</text>
    <text x="390" y="322">| East   | 143.9        | +11.4%       |</text>
  </g>
  <text x="390" y="342" font-size="11.5" fill="#065f46">the model reads row by row and quotes figures exactly</text>
</svg>
